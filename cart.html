<!DOCTYPE html>
<html>
<head>
<title>FitNest</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.cart-container {
  max-width: 800px;
  margin: 0 auto;
}

.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.cart-item img {
  width: 90px;
  border-radius: 8px;
}

.item-info {
  flex: 1;
  margin-left: 15px;
}

.item-info h3 {
  margin: 0;
}

.item-controls {
  text-align: right;
}

.item-controls button {
  margin-left: 5px;
  padding: 5px 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.remove {
  background: #f44336;
  color: white;
}
.remove:hover {
  background: #d32f2f;
}

.qty-btn {
  background: #333;
  color: white;
}
.qty-btn:hover {
  background: #555;
}

.total {
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  margin-top: 20px;
  transition: all 0.3s ease;
}

.buy-btn {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.buy-btn:hover {
  background: #45a049;
}

.confirmation {
  text-align: center;
  padding: 20px;
  background: #e0ffe0;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>
<body>

<h1>🛒 Your Cart</h1>
<div class="cart-container"></div>
<div class="total">Total Price: ₹0</div>

<button class="buy-btn" onclick="checkout()">Buy Now</button>
<br><br>
<div style="text-align:center;">
  <a href="index.html">⬅ Continue Shopping</a>
</div>

<script>
function loadCart(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.querySelector(".cart-container");
    container.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        container.innerHTML = "<p style='text-align:center;'>🛒 Your cart is empty!</p>";
        document.querySelector(".total").innerText = "Total Price: ₹0";
        return;
    }

    cart.forEach((item, index)=>{
        let div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
            <img src="${item.img}">
            <div class="item-info">
                <h3>${item.name}</h3>
                <p class="price">₹${item.price}</p>
            </div>
            <div class="item-controls">
                <button class="qty-btn" onclick="updateQty(${index}, ${item.qty-1})">-</button>
                <span>${item.qty}</span>
                <button class="qty-btn" onclick="updateQty(${index}, ${item.qty+1})">+</button>
                <button class="remove" onclick="removeItem(${index})">Remove</button>
            </div>
        `;
        container.appendChild(div);
        total += item.price * item.qty;
    });

    document.querySelector(".total").innerText = "Total Price: ₹" + total;
}

function updateQty(index, qty){
    let cart = JSON.parse(localStorage.getItem("cart"));
    if(qty < 1) return;
    cart[index].qty = parseInt(qty);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function removeItem(index){
    let cart = JSON.parse(localStorage.getItem("cart"));
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function checkout(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }
    // Save order history
    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    cart.forEach(item=>{
        orders.push(`${item.name} (Qty: ${item.qty}) - ₹${item.price*item.qty}`);
    });
    localStorage.setItem("orders", JSON.stringify(orders));

    // Clear cart
    localStorage.removeItem("cart");
    loadCart();

    document.querySelector(".cart-container").innerHTML =
      "<div class='confirmation'>✅ Order Placed Successfully!</div>";
}

window.onload = loadCart;
</script>

</body>
</html>
